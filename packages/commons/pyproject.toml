[project]
name = "harnyx-commons"
version = "0.1.3"
description = "Shared SDK utilities and sandbox harness for the Harnyx Subnet."
readme = "README.md"
requires-python = ">=3.11,<3.12"
authors = [
  { name = "Harnyx Labs", email = "engineering@harnyx.example" }
]
dependencies = [
  "harnyx-miner-sdk>=0.1.2",
  "aiobotocore>=3.4.0,<3.5",
  "botocore>=1.42.79,<1.42.85",
  "pydantic>=2.8",
  "httpx>=0.27",
  "sentry-sdk>=2.55.0",
  "langfuse>=3.14.1",
  "google-cloud-logging>=3.11",
  "google-genai>=1.52.0",
  "google-auth>=2.28",
  "anthropic>=0.75.0",
  "opentelemetry-sdk>=1.39",
  "opentelemetry-exporter-otlp-proto-http>=1.39",
  "opentelemetry-exporter-prometheus>=0.62b0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4",
]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harnyx_commons"]
include = [
  "src/harnyx_commons/sandbox/seccomp/*.json",
  "src/harnyx_commons/miner_task_benchmark/deepsearchqa/data/current_version.json",
  "src/harnyx_commons/miner_task_benchmark/deepsearchqa/data/versions/*/*.csv",
  "src/harnyx_commons/miner_task_benchmark/deepsearchqa/data/versions/*/*.json",
]

[tool.deptry.package_module_name_map]
aiobotocore = "aiobotocore"
harnyx-miner-sdk = "harnyx_miner_sdk"
anthropic = "anthropic"
botocore = "botocore"
google-auth = "google"
google-cloud-logging = "google"
google-genai = "google"
langfuse = "langfuse"
sentry-sdk = "sentry_sdk"
opentelemetry-exporter-otlp-proto-http = "opentelemetry"
opentelemetry-sdk = "opentelemetry"
