[project]
name = "harnyx-miner-sdk"
version = "0.1.1"
description = "Agent-facing SDK for Harnyx miners (entrypoints, tool helpers, LLM wire types)."
requires-python = ">=3.11,<3.12"
authors = [
  { name = "Harnyx Labs", email = "engineering@harnyx.example" }
]
dependencies = [
  "pydantic>=2.8",
  "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4",
]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harnyx_miner_sdk"]
